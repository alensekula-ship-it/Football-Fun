name: Build Football Fun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: footballfun-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify FootballFun.zip exists
        shell: bash
        run: |
          set -e

          if [ ! -f "$GITHUB_WORKSPACE/FootballFun.zip" ]; then
            echo "ERROR: FootballFun.zip nije pronađen u glavnoj mapi repozitorija."
            exit 1
          fi

          echo "FootballFun.zip je pronađen."

      - name: Unzip project
        shell: bash
        run: |
          set -e

          rm -rf "$GITHUB_WORKSPACE/project"
          mkdir -p "$GITHUB_WORKSPACE/project"

          unzip -q "$GITHUB_WORKSPACE/FootballFun.zip" \
            -d "$GITHUB_WORKSPACE/project"

          echo "Projekt je raspakiran."

      - name: Locate Android project
        shell: bash
        run: |
          set -e

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE/project" \
            -type f \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: Android projekt nije pronađen."
            echo "Nedostaje settings.gradle ili settings.gradle.kts."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android projekt pronađen u: $PROJECT_DIR"

      - name: Prepare Gradle
        shell: bash
        run: |
          set -e

          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "USE_WRAPPER=true" >> "$GITHUB_ENV"
            echo "Koristit će se Gradle Wrapper."
          else
            echo "USE_WRAPPER=false" >> "$GITHUB_ENV"
            echo "Gradle Wrapper nije pronađen. Koristit će se instalirani Gradle."
          fi

      - name: Build Debug APK
        shell: bash
        run: |
          set -e

          cd "$PROJECT_DIR"

          if [ "$USE_WRAPPER" = "true" ]; then
            ./gradlew --no-daemon --stacktrace assembleDebug
          else
            gradle --no-daemon --stacktrace assembleDebug
          fi

      - name: Build Release AAB
        shell: bash
        run: |
          set -e

          cd "$PROJECT_DIR"

          if [ "$USE_WRAPPER" = "true" ]; then
            ./gradlew --no-daemon --stacktrace bundleRelease
          else
            gradle --no-daemon --stacktrace bundleRelease
          fi

      - name: Find generated APK
        shell: bash
        run: |
          set -e

          APK_PATH="$(find "$PROJECT_DIR" \
            -type f \
            -name "*.apk" \
            -path "*/build/outputs/apk/*" \
            | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK nije pronađen nakon builda."
            echo "Pronađene build output datoteke:"
            find "$PROJECT_DIR" -type f -path "*/build/outputs/*" || true
            exit 1
          fi

          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "APK pronađen: $APK_PATH"

      - name: Find generated AAB
        shell: bash
        run: |
          set -e

          AAB_PATH="$(find "$PROJECT_DIR" \
            -type f \
            -name "*.aab" \
            -path "*/build/outputs/bundle/*" \
            | head -n 1)"

          if [ -z "$AAB_PATH" ]; then
            echo "ERROR: AAB nije pronađen nakon builda."
            echo "Pronađene build output datoteke:"
            find "$PROJECT_DIR" -type f -path "*/build/outputs/*" || true
            exit 1
          fi

          echo "AAB_PATH=$AAB_PATH" >> "$GITHUB_ENV"
          echo "AAB pronađen: $AAB_PATH"

      - name: Upload Football Fun APK
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-APK
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Football Fun AAB
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-AAB
          path: ${{ env.AAB_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        shell: bash
        run: |
          {
            echo "## Football Fun build uspješan"
            echo ""
            echo "- APK: \`$APK_PATH\`"
            echo "- AAB: \`$AAB_PATH\`"
            echo "- Projekt: \`$PROJECT_DIR\`"
          } >> "$GITHUB_STEP_SUMMARY"
