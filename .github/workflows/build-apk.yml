name: Build Football Fun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: footballfun-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify FootballFun.zip exists
        run: |
          if [ ! -f FootballFun.zip ]; then
            echo "ERROR: FootballFun.zip not found!"
            exit 1
          fi

      - name: Unzip project
        run: |
          rm -rf project
          mkdir project
          unzip -q FootballFun.zip -d project

      - name: Locate Android project
        run: |
          PROJECT_DIR=$(find project -name settings.gradle -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR=$(find project -name settings.gradle.kts -exec dirname {} \; | head -n 1)
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "Android project not found!"
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project found:"
          echo "$PROJECT_DIR"

      - name: Grant Gradle permission
        run: |
          chmod +x "$PROJECT_DIR/gradlew"

      - name: Build Debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release Bundle (AAB)
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-APK
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-AAB
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/bundle/release/*.aab

      - name: Build summary
        run: |
          echo "Football Fun build completed successfully."
