name: Build Football Fun APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Find and unpack source ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f -iname '*.zip' | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"

          rm -rf "$GITHUB_WORKSPACE/extracted"
          mkdir -p "$GITHUB_WORKSPACE/extracted"

          unzip -q "$ZIP_FILE" -d "$GITHUB_WORKSPACE/extracted"

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE/extracted" -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "settings.gradle or settings.gradle.kts was not found."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project found at: $PROJECT_DIR"

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew --no-daemon --stacktrace assembleDebug
          else
            gradle --no-daemon --stacktrace assembleDebug
          fi

      - name: Find generated APK
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(find "$PROJECT_DIR" -type f -path '*/build/outputs/apk/debug/*.apk' | head -n 1)"

          if [ -z "$APK_FILE" ]; then
            echo "APK file was not found."
            exit 1
          fi

          echo "APK_FILE=$APK_FILE" >> "$GITHUB_ENV"
          echo "Generated APK: $APK_FILE"

      - name: Upload Football Fun APK
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-debug-apk
          path: ${{ env.APK_FILE }}
          if-no-files-found: error
          retention-days: 30
