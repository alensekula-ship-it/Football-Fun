name: Build Football Fun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: footballfun-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Verify FootballFun.zip
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$GITHUB_WORKSPACE/FootballFun.zip" ]; then
            echo "ERROR: FootballFun.zip nije pronađen."
            exit 1
          fi

      - name: Unpack project
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$GITHUB_WORKSPACE/project"
          mkdir -p "$GITHUB_WORKSPACE/project"

          unzip -q "$GITHUB_WORKSPACE/FootballFun.zip" \
            -d "$GITHUB_WORKSPACE/project"

      - name: Locate Android project
        shell: bash
        run: |
          set -euo pipefail

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE/project" \
            -type f \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: settings.gradle nije pronađen."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Projekt: $PROJECT_DIR"

      - name: Show Gradle version
        shell: bash
        run: gradle --version

      - name: Build Debug APK
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace clean assembleDebug

      - name: Build Release AAB
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace bundleRelease

      - name: Find APK
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="$(find "$PROJECT_DIR" \
            -type f \
            -name "*.apk" \
            | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK nije pronađen."
            find "$PROJECT_DIR" -type f -path "*/build/outputs/*" || true
            exit 1
          fi

          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "APK: $APK_PATH"

      - name: Find AAB
        shell: bash
        run: |
          set -euo pipefail

          AAB_PATH="$(find "$PROJECT_DIR" \
            -type f \
            -name "*.aab" \
            | head -n 1)"

          if [ -z "$AAB_PATH" ]; then
            echo "ERROR: AAB nije pronađen."
            find "$PROJECT_DIR" -type f -path "*/build/outputs/*" || true
            exit 1
          fi

          echo "AAB_PATH=$AAB_PATH" >> "$GITHUB_ENV"
          echo "AAB: $AAB_PATH"

      - name: Upload Football Fun APK
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-APK
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Football Fun AAB
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-AAB
          path: ${{ env.AAB_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        shell: bash
        run: |
          {
            echo "## Football Fun build uspješan"
            echo ""
            echo "- APK napravljen"
            echo "- AAB napravljen"
          } >> "$GITHUB_STEP_SUMMARY"
