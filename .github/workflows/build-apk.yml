name: Build Football Fun

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: footballfun-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Extract project
        shell: bash
        run: |
          set -euo pipefail

          test -f "$GITHUB_WORKSPACE/FootballFun.zip"

          rm -rf "$GITHUB_WORKSPACE/extracted"
          mkdir -p "$GITHUB_WORKSPACE/extracted"

          unzip -q "$GITHUB_WORKSPACE/FootballFun.zip" \
            -d "$GITHUB_WORKSPACE/extracted"

          PROJECT_DIR="$GITHUB_WORKSPACE/extracted/FootballFun"

          test -f "$PROJECT_DIR/settings.gradle"
          test -f "$PROJECT_DIR/app/build.gradle"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Build APK and AAB
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail

          gradle \
            --no-daemon \
            --stacktrace \
            clean \
            assembleDebug \
            bundleRelease

      - name: Collect outputs
        shell: bash
        run: |
          set -euo pipefail

          APK="$(find "$PROJECT_DIR/app/build/outputs/apk" \
            -type f -name '*.apk' | head -n 1)"

          AAB="$(find "$PROJECT_DIR/app/build/outputs/bundle" \
            -type f -name '*.aab' | head -n 1)"

          test -n "$APK"
          test -f "$APK"

          test -n "$AAB"
          test -f "$AAB"

          mkdir -p "$GITHUB_WORKSPACE/output"

          cp "$APK" \
            "$GITHUB_WORKSPACE/output/FootballFun-debug.apk"

          cp "$AAB" \
            "$GITHUB_WORKSPACE/output/FootballFun-release-unsigned.aab"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-APK
          path: output/FootballFun-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FootballFun-AAB
          path: output/FootballFun-release-unsigned.aab
          if-no-files-found: error
          retention-days: 30
